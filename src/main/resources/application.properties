spring.application.name=twitterclone

jwt.private.key=classpath:app_pkcs8.key
jwt.public.key=classpath:app.pub

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/twitterclone}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:test123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=${SHOW_SQL:true}
server.port=${SERVER_PORT:1010}