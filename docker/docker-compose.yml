services:
  mysql:
    image: mysql:8.4
    container_name: twitterclone-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: twitterclone
      MYSQL_ROOT_PASSWORD: test123
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ptest123"]
      interval: 10s
      timeout: 5s
      retries: 8